<header class="navbar" [class.scrolled]="isScrolled()">
  <div class="navbar__inner">
    <!-- Logo -->
    <a routerLink="/" class="navbar__logo">
      <span class="navbar__logo-dot">•</span>
      <div class="navbar__logo-text">
        <span class="navbar__logo-name">Fotoateliér</span>
        <span class="navbar__logo-sub">v palírně</span>
      </div>
    </a>

    <!-- Desktop nav -->
    <nav class="navbar__nav">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="navbar__link"
        >{{ item.label }}</a>
      }
    </nav>

    <!-- CTA -->
    <a routerLink="/kontakt" class="navbar__cta">
      Rezervovat <span>→</span>
    </a>

    <!-- Hamburger -->
    <button class="navbar__hamburger" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()">
      <span [class.open]="isMenuOpen()"></span>
      <span [class.open]="isMenuOpen()"></span>
      <span [class.open]="isMenuOpen()"></span>
    </button>
  </div>
</header>

<!-- Mobile menu -->
<div class="mobile-menu" [class.open]="isMenuOpen()">
  <nav class="mobile-menu__nav">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        class="mobile-menu__link"
      >{{ item.label }}</a>
    }
    <a routerLink="/kontakt" class="mobile-menu__cta">Rezervovat →</a>
  </nav>
</div>
