<!-- Styling for named classes lives in navbar.component.scss via @apply -->
<header
  class="navbar fixed inset-x-0 top-0 z-[100] bg-site-bg border-b border-site-border"
  [class.scrolled]="isScrolled()"
>
  <div class="max-w-site mx-auto px-6 md:px-12 h-[72px] flex items-center justify-between">

    <!-- Logo -->
    <a routerLink="/" class="flex items-center gap-3 no-underline text-site-text">
      <img
        src="https://picsum.photos/seed/fotopalirna/40/40"
        alt="Logo"
        class="w-9 h-9 object-cover rounded-sm block flex-shrink-0"
      />
      <div class="flex flex-col leading-[1.1]">
        <span class="font-site-serif text-[17px] font-medium tracking-[0.01em]">Fotoateliér</span>
        <span class="font-site-sans text-[9px] tracking-[0.18em] uppercase text-site-muted">v palírně</span>
      </div>
    </a>

    <!-- Desktop nav — link appearance fully defined by .navbar__link in SCSS -->
    <nav class="hidden min-[900px]:flex gap-9 items-center">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.route === '/' }"
          class="navbar__link"
        >{{ item.label }}</a>
      }
    </nav>

    <!-- Hamburger — bar appearance defined by .hamburger-bar in SCSS -->
    <button
      class="navbar__hamburger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen()"
    >
      <span class="hamburger-bar" [class.open]="isMenuOpen()"></span>
      <span class="hamburger-bar" [class.open]="isMenuOpen()"></span>
      <span class="hamburger-bar" [class.open]="isMenuOpen()"></span>
    </button>
  </div>
</header>

<!-- Mobile menu — link appearance defined by .mobile-menu__link in SCSS -->
<div
  class="mobile-menu fixed inset-0 z-[90] bg-site-bg flex items-center justify-center"
  [class.open]="isMenuOpen()"
>
  <nav class="flex flex-col items-center gap-8">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.route === '/' }"
        class="mobile-menu__link"
      >{{ item.label }}</a>
    }
    <a routerLink="/kontakt" class="mobile-menu__cta">Rezervovat →</a>
  </nav>
</div>
