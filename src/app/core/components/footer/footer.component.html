<!-- Link appearances defined by .footer__nav-link / .footer__social-link in SCSS via @apply -->
<footer class="bg-site-text text-[rgba(245,240,232,0.7)] pt-8 pb-5">
  <div class="max-w-site mx-auto px-6 md:px-12">

    <div class="grid grid-cols-1 md:grid-cols-[2fr_1fr_1fr] gap-5 md:gap-8 pb-5 border-b border-white/10 md:items-center">

      <!-- Brand -->
      <div class="flex gap-[10px] items-center">
        <span class="text-site-accent text-[18px] leading-none">•</span>
        <div>
          <p class="font-site-serif text-[16px] text-site-bg mb-[2px]">Fotoateliér v palírně</p>
          <p class="font-site-serif italic text-[12px]">Zachycuji okamžiky, které zůstávají.</p>
        </div>
      </div>

      <!-- Nav — items from NavigationService, same list as the header navbar -->
      <nav class="flex flex-row flex-wrap gap-x-5 gap-y-2">
        @for (item of navItems; track item.route) {
          <a [routerLink]="item.route" class="footer__nav-link">{{ item.label }}</a>
        }
      </nav>

      <!-- Social — links from NavigationService, same list as contact page -->
      <div>
        <p class="text-[9px] tracking-[0.18em] uppercase mb-2 text-[rgba(245,240,232,0.65)]">Sledovat</p>
        <div class="flex flex-row gap-4">
          @for (s of socialLinks; track s.label) {
            <a [href]="s.url" target="_blank" rel="noopener" class="footer__social-link">{{ s.label }}</a>
          }
        </div>
      </div>

    </div>

    <!-- Bottom row -->
    <div class="pt-4 flex justify-between items-center flex-wrap gap-[6px] text-[11px] text-[rgba(245,240,232,0.6)]">
      <p>© {{ year }} Fotoateliér v palírně. Všechna práva vyhrazena.</p>
      <app-obfuscated-email
        encoded="YWhvakBwYWxpcm5hLmN6"
        linkClass="text-[rgba(245,240,232,0.6)] no-underline hover:opacity-80 transition-opacity duration-200"
      ></app-obfuscated-email>
    </div>

  </div>
</footer>
